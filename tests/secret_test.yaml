suite: Secret tests
templates:
  - secret.yaml
tests:

  - it: chart-managed Secret is rendered when existingSecret is not set
    set:
      upstream.service.name: myapp
      upstream.service.port: 8080
      ingress.hostname: app.example.org
      oidc.issuerURL: https://iam.example.org/
      oidc.clientID: my-client
      oidc.clientSecret: my-secret
    release:
      name: test
    asserts:
      - isKind:
          of: Secret
      - equal:
          path: metadata.name
          value: test-iam-auth-proxy
      - isNotNull:
          path: data.issuerURL
      - isNotNull:
          path: data.clientID
      - isNotNull:
          path: data.clientSecret
      - isNotNull:
          path: data.suggestedCookieSecret

  - it: no Secret is rendered when existingSecret is set
    set:
      upstream.service.name: myapp
      upstream.service.port: 8080
      ingress.hostname: app.example.org
      oidc.existingSecret: my-external-secret
    release:
      name: test
    asserts:
      - hasDocuments:
          count: 0
