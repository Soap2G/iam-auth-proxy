suite: Ingress tests
templates:
  - ingress.yaml
tests:

  - it: Ingress is rendered with correct host, path and backend
    set:
      upstream.service.name: myapp
      upstream.service.port: 8080
      ingress.enabled: true
      ingress.hostname: app.example.org
      ingress.className: nginx
    release:
      name: test
    asserts:
      - isKind:
          of: Ingress
      - equal:
          path: metadata.name
          value: test-iam-auth-proxy
      - equal:
          path: spec.ingressClassName
          value: nginx
      - equal:
          path: spec.rules[0].host
          value: app.example.org
      - equal:
          path: spec.rules[0].http.paths[0].path
          value: /
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.name
          value: test-iam-auth-proxy
      - equal:
          path: spec.rules[0].http.paths[0].backend.service.port.number
          value: 4180

  - it: TLS block is present when ingress.tls.enabled
    set:
      upstream.service.name: myapp
      upstream.service.port: 8080
      ingress.enabled: true
      ingress.hostname: app.example.org
      ingress.tls.enabled: true
      ingress.tls.secretName: app-tls
    release:
      name: test
    asserts:
      - equal:
          path: spec.tls[0].hosts[0]
          value: app.example.org
      - equal:
          path: spec.tls[0].secretName
          value: app-tls

  - it: TLS block is absent when ingress.tls.enabled is false
    set:
      upstream.service.name: myapp
      upstream.service.port: 8080
      ingress.enabled: true
      ingress.hostname: app.example.org
      ingress.tls.enabled: false
    release:
      name: test
    asserts:
      - isNull:
          path: spec.tls

  - it: no Ingress rendered when ingress.enabled is false
    set:
      upstream.service.name: myapp
      upstream.service.port: 8080
      ingress.enabled: false
      route.enabled: true
      route.hostname: app.apps.mycluster.example.org
    release:
      name: test
    asserts:
      - hasDocuments:
          count: 0

  - it: annotations are rendered on the Ingress
    set:
      upstream.service.name: myapp
      upstream.service.port: 8080
      ingress.enabled: true
      ingress.hostname: app.example.org
      ingress.annotations:
        cert-manager.io/cluster-issuer: letsencrypt-prod
    release:
      name: test
    asserts:
      - equal:
          path: metadata.annotations
          value:
            cert-manager.io/cluster-issuer: letsencrypt-prod
