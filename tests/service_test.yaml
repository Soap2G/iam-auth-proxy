suite: Service tests
templates:
  - service.yaml
tests:

  - it: Service is a ClusterIP on port 4180
    set:
      upstream.service.name: myapp
      upstream.service.port: 8080
      ingress.hostname: app.example.org
    release:
      name: test
    asserts:
      - isKind:
          of: Service
      - equal:
          path: metadata.name
          value: test-iam-auth-proxy
      - equal:
          path: spec.type
          value: ClusterIP
      - equal:
          path: spec.ports[0].port
          value: 4180
      - equal:
          path: spec.ports[0].targetPort
          value: 4180
      - equal:
          path: spec.ports[0].name
          value: oauth2-proxy

  - it: selector labels match pod template labels
    set:
      upstream.service.name: myapp
      upstream.service.port: 8080
      ingress.hostname: app.example.org
    release:
      name: test
    asserts:
      - equal:
          path: spec.selector
          value:
            app.kubernetes.io/name: iam-auth-proxy
            app.kubernetes.io/instance: test
