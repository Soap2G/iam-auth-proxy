{{- include "iam-auth-proxy.validateEntrypoint" . }}
{{- include "iam-auth-proxy.validateCredentials" . }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "iam-auth-proxy.fullname" . }}
  labels:
    {{- include "iam-auth-proxy.labels" . | nindent 4 }}
  annotations:
    app.openshift.io/connects-to: {{ .Values.upstream.service.name | quote }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "iam-auth-proxy.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "iam-auth-proxy.selectorLabels" . | nindent 8 }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: oauth2-proxy
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          env:
            - name: "OAUTH2_PROXY_HTTP_ADDRESS"
              value: ":4180"
            - name: "OAUTH2_PROXY_METRICS_ADDRESS"
              value: ":44180"
            - name: "OAUTH2_PROXY_SILENCE_PING_LOGGING"
              value: "true"
            - name: "OAUTH2_PROXY_REVERSE_PROXY"
              value: "true"
            - name: "OAUTH2_PROXY_PROVIDER"
              value: "oidc"
            - name: "OAUTH2_PROXY_OIDC_ISSUER_URL"
              valueFrom:
                secretKeyRef:
                  name: {{ include "iam-auth-proxy.secretName" . }}
                  key: issuer-url
            - name: "OAUTH2_PROXY_CLIENT_ID"
              valueFrom:
                secretKeyRef:
                  name: {{ include "iam-auth-proxy.secretName" . }}
                  key: client-id
            - name: "OAUTH2_PROXY_CLIENT_SECRET"
              valueFrom:
                secretKeyRef:
                  name: {{ include "iam-auth-proxy.secretName" . }}
                  key: client-secret
            - name: "OAUTH2_PROXY_COOKIE_SECRET"
              valueFrom:
                secretKeyRef:
                  name: {{ include "iam-auth-proxy.secretName" . }}
                  key: cookie-secret
            - name: "OAUTH2_PROXY_REDIRECT_URL"
              value: {{ include "iam-auth-proxy.redirectUri" . | quote }}
            - name: "OAUTH2_PROXY_UPSTREAMS"
              value: {{ include "iam-auth-proxy.upstreamUrl" . | quote }}
            - name: "OAUTH2_PROXY_PROXY_PREFIX"
              value: {{ include "iam-auth-proxy.proxyPrefix" . | quote }}
            - name: "OAUTH2_PROXY_COOKIE_PATH"
              value: {{ include "iam-auth-proxy.cookiePath" . | quote }}
            - name: "OAUTH2_PROXY_SCOPE"
              value: {{ include "iam-auth-proxy.scope" . | quote }}
            - name: "OAUTH2_PROXY_OIDC_GROUPS_CLAIM"
              value: {{ include "iam-auth-proxy.oidcGroupsClaim" . | quote }}
            {{- if .Values.authOptions.allowedGroups }}
            - name: "OAUTH2_PROXY_ALLOWED_GROUPS"
              value: {{ .Values.authOptions.allowedGroups | join "," | quote }}
            {{- end }}
            - name: "OAUTH2_PROXY_EMAIL_DOMAINS"
              value: {{ .Values.authOptions.emailDomains | join "," | quote }}
            - name: "OAUTH2_PROXY_PREFER_EMAIL_TO_USER"
              value: {{ .Values.authOptions.preferEmail | quote }}
            {{- if .Values.authOptions.whitelistDomains }}
            - name: "OAUTH2_PROXY_WHITELIST_DOMAINS"
              value: {{ .Values.authOptions.whitelistDomains | join "," | quote }}
            {{- end }}
            - name: "OAUTH2_PROXY_COOKIE_EXPIRE"
              value: {{ .Values.authOptions.cookieExpire | quote }}
            - name: "OAUTH2_PROXY_SKIP_PROVIDER_BUTTON"
              value: "true"
          {{- if .Values.authOptions.extraArgs }}
          args:
            {{- range .Values.authOptions.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          {{- end }}
          ports:
            - name: http
              containerPort: 4180
              protocol: TCP
            - name: metrics
              containerPort: 44180
              protocol: TCP
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /ping
              port: http
          readinessProbe:
            httpGet:
              path: /ping
              port: http
